workflows:
  android-apk:
    name: Android APK Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: 20
      java: 17
      vars:
        GRADLE_OPTS: "-Xmx3g -XX:MaxMetaspaceSize=512m"
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - $CM_BUILD_DIR/artifacts/sms-forwarder/node_modules
    scripts:
      - name: Install pnpm
        script: npm install -g pnpm
      - name: Install dependencies
        script: pnpm install --frozen-lockfile
      - name: Expo prebuild
        script: |
          cd artifacts/sms-forwarder
          pnpm exec expo prebuild --platform android --clean --no-install
      - name: Build release APK
        script: |
          cd artifacts/sms-forwarder/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --quiet
    artifacts:
      - artifacts/sms-forwarder/android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - $CM_SUBMITTER_EMAIL
        notify:
          success: true
          failure: true
